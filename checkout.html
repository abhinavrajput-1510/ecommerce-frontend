<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | ShopEasy</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <header class="site-header">
      <div
        id="network-status"
        class="network-status online"
        title="Connection status"
      >
        <span class="status-indicator"></span>
        <span class="status-text">Online</span>
      </div>

      <div class="header-top">
        <div class="brand-logo">
          <span class="logo-icon">🛍️</span>
          <span class="logo-text">ShopEasy</span>
        </div>

        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="index.html#products">Products</a>
          <a href="cart.html">Cart</a>
        </nav>

        <div class="header-actions">
          <div class="search-bar">
            <input
              type="search"
              placeholder="Search products..."
              aria-label="Search products"
            />
            <button type="button">Search</button>
          </div>

          <div class="cart-widget" aria-label="Shopping cart">
            <span class="cart-icon">🛒</span>
            <span class="cart-badge">0</span>
          </div>

          <button class="hamburger-menu" aria-label="Open mobile menu">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
          </button>
        </div>
      </div>

      <h1>Checkout</h1>
    </header>

    <section class="checkout-section">
      <div class="checkout-content">
        <h2>Checkout is coming soon</h2>
        <p>
          Your cart has been saved. In the next step, you would enter shipping
          and payment details.
        </p>
        <a class="button button-primary" href="cart.html">Return to Cart</a>
      </div>
    </section>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const cartBadge = document.querySelector(".cart-badge");
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        if (cartBadge) {
          cartBadge.textContent = totalItems;
          cartBadge.style.display = totalItems > 0 ? "flex" : "none";
        }
      });
    </script>
  </body>
</html>
